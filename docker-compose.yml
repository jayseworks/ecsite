version: "3.9"

services:
  web:
    build: .
    volumes:
      - .:/app
      - sqlite-data:/app/db
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    environment:
      RAILS_ENV: development
    command: >
      bash -c "
        npm install &&
        npm run build:css:watch &
        rails server -b 0.0.0.0
      "

volumes:
  sqlite-data:
  node_modules:
